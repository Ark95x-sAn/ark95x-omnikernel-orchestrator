name: council-ouroboros CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyyaml

      - name: Seed CI .env from example
        run: |
          if [ -f council-ouroboros/.env.example ]; then
            cp council-ouroboros/.env.example council-ouroboros/.env
          fi
          if [ -f .env.example ] && [ ! -f .env ]; then
            cp .env.example .env
          fi
          echo "GATED_STRIPE=dry" >> council-ouroboros/.env 2>/dev/null || true
          echo "GATED_FILING=dry" >> council-ouroboros/.env 2>/dev/null || true
          echo "GATED_EMAIL=dry" >> council-ouroboros/.env 2>/dev/null || true
          echo "GATED_MERGE=dry" >> council-ouroboros/.env 2>/dev/null || true

      - name: Python syntax check (non-fatal)
        continue-on-error: true
        run: |
          find . -name '*.py' -not -path './.git/*' -print0 | xargs -0 -n1 python -m py_compile || true
          ruff check . --select E9,F63,F7,F82 --output-format=github || true

      - name: Validate docker-compose (non-fatal)
        continue-on-error: true
        run: |
          if [ -f council-ouroboros/docker-compose.yml ]; then
            docker compose -f council-ouroboros/docker-compose.yml --env-file council-ouroboros/.env config > /dev/null
          elif [ -f docker-compose.yml ]; then
            docker compose -f docker-compose.yml config > /dev/null
          else
            echo "No docker-compose.yml found; skipping."
          fi

      - name: Validate workflow YAML
        run: |
          python -c "import yaml,glob; [yaml.safe_load(open(f)) for f in glob.glob('.github/workflows/*.yml')]"

      - name: Dry-run smoke (gates forced to dry)
        env:
          GATED_STRIPE: dry
          GATED_FILING: dry
          GATED_EMAIL: dry
          GATED_MERGE: dry
        run: |
          echo "[dry-run] council-ouroboros gates: STRIPE=$GATED_STRIPE FILING=$GATED_FILING EMAIL=$GATED_EMAIL MERGE=$GATED_MERGE"
          echo "[dry-run] Phase 1 smoke complete (no external side effects)."
